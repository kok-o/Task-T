databases:
  - name: nail-studio-db
    databaseName: nail_studio
    user: admin
    plan: free

services:
  - type: web
    name: nail-studio-api
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate --schema=apps/api/prisma/schema.prisma && npm run build --workspace=apps/api
    startCommand: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma && npm run seed --workspace=apps/api && npm run start --workspace=apps/api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nail-studio-db
          property: connectionString
      - key: PORT
        value: 3001
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: "https://nail-studio-web-p44f.onrender.com"
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        value: ""
      - key: EMAIL_PASS
        value: ""
      - key: EMAIL_FROM
        value: "nailstudio@gmail.com"

  - type: web
    name: nail-studio-web
    env: static
    buildCommand: npm install && npm run build --workspace=apps/web
    staticPublishPath: ./apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: "https://nail-studio-api-p44f.onrender.com/api/v1"
