version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nail-studio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nailstudio
      POSTGRES_PASSWORD: nailpass123
      POSTGRES_DB: nailstudio
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nailstudio']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
